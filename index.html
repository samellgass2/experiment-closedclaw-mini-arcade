<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mini Arcade - Anomaly Detector</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main class="page-shell">
    <section class="game-card" aria-label="Anomaly Detector game area">
      <header class="game-header">
        <h1 class="game-title">Anomaly Detector</h1>
        <p class="game-subtitle">Find the odd tile before time runs out.</p>
      </header>

      <div class="hud" aria-live="polite">
        <div class="hud-item">
          <span class="hud-label">Score</span>
          <strong id="scoreValue" class="hud-value">0</strong>
        </div>
        <div class="hud-item">
          <span class="hud-label">Best</span>
          <strong id="bestScoreValue" class="hud-value">0</strong>
        </div>
        <div class="hud-item">
          <span class="hud-label">Lives</span>
          <strong id="livesValue" class="hud-value">3</strong>
        </div>
        <div class="hud-item">
          <span class="hud-label">Level</span>
          <strong id="levelValue" class="hud-value">1</strong>
        </div>
        <div class="hud-item">
          <span class="hud-label">Time</span>
          <strong id="timeValue" class="hud-value">20</strong>
        </div>
        <div id="statusValue" class="hud-item hud-status">Ready</div>
      </div>

      <div class="game-stage-wrap">
        <canvas
          id="gameCanvas"
          class="game-canvas"
          width="640"
          height="640"
          role="img"
          aria-label="Anomaly detector game grid"
        ></canvas>

        <div id="overlay" class="overlay visible">
          <h2 id="overlayTitle" class="overlay-title">Anomaly Detector</h2>
          <p id="overlayMessage" class="overlay-message">Click Start to begin. Find the one tile that does not match.</p>
          <button id="startButton" class="action-button" type="button">Start Game</button>
        </div>
      </div>

      <footer class="game-footer">
        <ul class="controls-list">
          <li><kbd>Click</kbd> Select tile</li>
          <li><kbd>Enter</kbd> Start or continue</li>
          <li><kbd>P</kbd> Pause</li>
          <li><kbd>R</kbd> Restart</li>
        </ul>
      </footer>
    </section>
  </main>

  <script type="module" src="js/game.js"></script>
</body>
</html>
