<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mini Arcade - Flappy Wing</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main class="page-shell">
    <section class="game-card" aria-label="Flappy Wing game area">
      <header class="game-header">
        <h1 class="game-title">Flappy Wing</h1>
        <p class="game-subtitle">Tap, fly, and dodge the towers.</p>
      </header>

      <div class="hud" aria-live="polite">
        <div class="hud-item">
          <span class="hud-label">Score</span>
          <strong id="scoreValue" class="hud-value">0</strong>
        </div>
        <div class="hud-item">
          <span class="hud-label">Best</span>
          <strong id="bestScoreValue" class="hud-value">0</strong>
        </div>
        <div class="hud-item hud-status" id="statusValue">Ready</div>
      </div>

      <div class="game-stage-wrap">
        <canvas
          id="gameCanvas"
          class="game-canvas"
          width="400"
          height="640"
          role="img"
          aria-label="Flappy Wing game canvas"
        ></canvas>

        <div id="overlay" class="overlay visible">
          <h2 id="overlayTitle" class="overlay-title">Flappy Wing</h2>
          <p id="overlayMessage" class="overlay-message">Press Space, click, or tap to start.</p>
          <button id="startButton" class="action-button" type="button">Start Game</button>
        </div>
      </div>

      <footer class="game-footer">
        <ul class="controls-list">
          <li><kbd>Space</kbd> Flap</li>
          <li><kbd>P</kbd> Pause</li>
          <li><kbd>R</kbd> Restart</li>
        </ul>
      </footer>
    </section>
  </main>

  <script src="js/game.js"></script>
</body>
</html>
